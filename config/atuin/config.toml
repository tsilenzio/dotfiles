# Sync settings
auto_sync = true
sync_frequency = "5m"
sync_address = "https://api.atuin.sh"

# Search behavior
search_mode = "fuzzy"
filter_mode = "global"
filter_mode_shell_up_key_binding = "host"

# UI
style = "auto"
show_preview = true
enter_accept = true
inline_height = 0

# Security: filter secrets from history
secrets_filter = true

[sync]
records = true
